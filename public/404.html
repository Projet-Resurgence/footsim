<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <script>
      // SPA redirect: encode path+hash into query param, redirect to base
      var l = window.location;
      var path = l.pathname.replace('/footsim', '') || '/';
      var hash = l.hash || '';
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/footsim/?p=' + encodeURIComponent(path + l.search) +
        (hash ? '&h=' + encodeURIComponent(hash) : '')
      );
    </script>
  </head>
  <body></body>
</html>
