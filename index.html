<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:ital,wght@1,500;1,600;1,700&display=swap" rel="stylesheet" />
    <title>FootSim</title>
    <meta name="description" content="Simulateur de matchs de football entre nations du Projet Résurgence." />

    <!-- Open Graph / Discord embed -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FootSim" />
    <meta property="og:title" content="FootSim — Simulateur Football" />
    <meta property="og:description" content="Simulateur de matchs de football entre nations du Projet Résurgence. Équipes, tactiques, compétitions et matchs en direct." />
    <meta property="og:url" content="https://footsim.projet-resurgence.fr/" />
    <meta property="og:image" content="https://footsim.projet-resurgence.fr/logo.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:locale" content="fr_FR" />

    <!-- Twitter card (aussi lu par Discord) -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="FootSim — Simulateur Football" />
    <meta name="twitter:description" content="Simulateur de matchs de football entre nations du Projet Résurgence." />
    <meta name="twitter:image" content="https://footsim.projet-resurgence.fr/logo.png" />
    <script>
      // Restore path+hash encoded by 404.html redirect
      (function() {
        var qs = new URLSearchParams(window.location.search);
        var p = qs.get('p');
        var h = qs.get('h');
        if (p) {
          window.history.replaceState(null, '', p + (h ? h : ''));
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
