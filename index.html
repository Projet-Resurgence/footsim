<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:ital,wght@1,500;1,600;1,700&display=swap" rel="stylesheet" />
    <title>FootSim</title>
    <script>
      // Restore path+hash encoded by 404.html redirect
      (function() {
        var qs = new URLSearchParams(window.location.search);
        var p = qs.get('p');
        var h = qs.get('h');
        if (p) {
          window.history.replaceState(null, '', p + (h ? h : ''));
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
