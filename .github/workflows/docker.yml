name: Build and push Docker image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/projet-resurgence/footsim:latest
          build-args: |
            VITE_DISCORD_CLIENT_ID=1499227649455689859
            VITE_DISCORD_REDIRECT_URI=https://footsim.projet-resurgence.fr/auth/callback
            VITE_ADMIN_DISCORD_ID=772821169664426025
            VITE_PR_API_URL=https://api.projet-resurgence.fr
